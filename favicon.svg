<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <style>
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    .cur { animation: blink 1s step-end infinite; }
  </style>
  <!-- Fond carré -->
  <rect x="0" y="0" width="200" height="200" rx="18" fill="#111c18"/>
  <rect x="0" y="0" width="200" height="200" rx="18" fill="none" stroke="#3ddc84" stroke-width="2"/>
  <!-- Barre terminal -->
  <rect x="0" y="0" width="200" height="32" rx="18" fill="#0e1a15"/>
  <rect x="0" y="16" width="200" height="16" fill="#0e1a15"/>
  <circle cx="22" cy="16" r="5" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="5" fill="#febc2e"/>
  <circle cx="58" cy="16" r="5" fill="#28c840"/>
  <!-- Initiales HP -->
  <text x="100" y="118" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="72" font-weight="700" fill="#3ddc84" letter-spacing="-2">HP</text>
  <!-- Ligne prompt -->
  <text x="22" y="168" font-family="'JetBrains Mono', monospace" font-size="12" fill="#2ab36a">~/portfolio</text>
  <rect x="114" y="157" width="9" height="14" fill="#3ddc84" class="cur"/>
</svg>
