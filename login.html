<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accès protégé — Hugo PROTTEAU</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 60px rgba(61,220,132,.06);
    }

    .login-icon {
      font-size: 2rem;
      margin-bottom: 1rem;
      display: block;
    }

    .login-box h1 {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: .4rem;
    }

    .login-box p {
      color: var(--muted);
      font-size: .85rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .login-label {
      font-family: var(--font-code);
      font-size: .72rem;
      color: var(--accent);
      letter-spacing: .1em;
      text-transform: uppercase;
      display: block;
      margin-bottom: .5rem;
    }

    .login-input-wrap {
      position: relative;
      margin-bottom: 1.25rem;
    }

    .login-input-wrap input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .85rem 3rem .85rem 1rem;
      color: var(--text);
      font-family: var(--font-code);
      font-size: .9rem;
      transition: border-color .2s;
    }
    .login-input-wrap input:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Bouton œil */
    .toggle-pwd {
      position: absolute; right: .85rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1rem;
      transition: color .2s; padding: 0;
    }
    .toggle-pwd:hover { color: var(--accent); }

    .login-btn {
      width: 100%;
      background: var(--accent);
      color: #0b1210;
      border: none;
      border-radius: 6px;
      padding: .9rem;
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: .95rem;
      cursor: pointer;
      transition: background .2s;
    }
    .login-btn:hover { background: #fff; }

    .login-error {
      display: none;
      margin-top: 1rem;
      background: rgba(255,95,87,.08);
      border: 1px solid rgba(255,95,87,.3);
      border-radius: 6px;
      padding: .75rem 1rem;
      font-family: var(--font-code);
      font-size: .8rem;
      color: #ff5f57;
    }

    .login-back {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-family: var(--font-code);
      font-size: .75rem;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
    }
    .login-back:hover { color: var(--accent); }
  </style>
</head>
<body>

  <div class="login-box">
    <span class="login-icon">🔒</span>
    <h1>Accès protégé</h1>
    <p>Cette section du portfolio est réservée. Veuillez saisir le mot de passe pour continuer.</p>

    <label class="login-label" for="pwd">Mot de passe</label>
    <div class="login-input-wrap">
      <input
        type="password"
        id="pwd"
        placeholder="••••••••••••••"
        autocomplete="current-password"
        onkeydown="if(event.key==='Enter') checkPwd()"
      />
      <button class="toggle-pwd" onclick="togglePwd()" type="button" title="Afficher/masquer">👁</button>
    </div>

    <button class="login-btn" onclick="checkPwd()">Accéder →</button>

    <div class="login-error" id="login-error">
      ✕ Mot de passe incorrect. Veuillez réessayer.
    </div>

    <a href="index.html" class="login-back">← Retour à l'accueil</a>
  </div>

  <script>
    // Hash SHA-256 du mot de passe
    const HASH = "ba3022a13aa9890908d441aec386c64b9ed6ab0d6db729b42460cf15de4acad4";

    // Récupère la page de destination depuis l'URL (?next=mes-projets.html)
    function getNext() {
      const params = new URLSearchParams(window.location.search);
      return params.get("next") || "mes-projets.html";
    }

    // Si déjà authentifié, redirige directement
    if (sessionStorage.getItem("auth") === HASH) {
      window.location.replace(getNext());
    }

    async function sha256(str) {
      const buf = await crypto.subtle.digest(
        "SHA-256",
        new TextEncoder().encode(str)
      );
      return Array.from(new Uint8Array(buf))
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");
    }

    async function checkPwd() {
      const input = document.getElementById("pwd").value;
      const hash  = await sha256(input);

      if (hash === HASH) {
        sessionStorage.setItem("auth", HASH);
        window.location.replace(getNext());
      } else {
        const err = document.getElementById("login-error");
        err.style.display = "block";
        document.getElementById("pwd").style.borderColor = "#ff5f57";
        setTimeout(() => {
          err.style.display = "none";
          document.getElementById("pwd").style.borderColor = "";
        }, 3000);
      }
    }

    function togglePwd() {
      const input = document.getElementById("pwd");
      input.type = input.type === "password" ? "text" : "password";
    }
  </script>
</body>
</html>
